<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Health Style App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1 id="header-title">Home</h1>
    </header>

    <main class="app-content">
        
        <section id="view-home" class="view active">
            <h2 class="section-title">Übersicht</h2>
            
            <div class="card">
                <div class="card-header">
                    <div class="icon-title">
                        <svg class="icon icon-orange" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm0 14a6 6 0 110-12 6 6 0 010 12z"/></svg>
                        <span>Schritte</span>
                    </div>
                    <span class="time">Heute</span>
                </div>
                <div class="card-value">
                    <span class="number">5.432</span>
                    <span class="unit">Schritte</span>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="icon-title">
                        <svg class="icon icon-red" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/></svg>
                        <span>Herzfrequenz</span>
                    </div>
                    <span class="time">Vor 2 Min.</span>
                </div>
                <div class="card-value">
                    <span class="number">68</span>
                    <span class="unit">S/Min</span>
                </div>
            </div>
            
            <div class="card empty-card"></div>
            <div class="card empty-card"></div>
        </section>

        <section id="view-listen" class="view">
            <h2 class="section-title">Deine Listen</h2>
            <div class="card">
                <p class="text-muted">Hier stehen deine Einträge.</p>
            </div>
        </section>

        <section id="view-loggen" class="view">
            <h2 class="section-title">Neuer Eintrag</h2>
            <div class="card">
                <p class="text-muted">Formular zum Loggen von Daten.</p>
            </div>
        </section>

        <section id="view-menu" class="view">
            <h2 class="section-title">Einstellungen</h2>
            <div class="card">
                <p class="text-muted">Profil und Account.</p>
            </div>
        </section>

    </main>

    <nav class="tab-bar">
        <ul class="tab-list">
            <li class="tab-item active" data-target="view-home" data-title="Home">
                <svg class="tab-icon" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
                <span>Home</span>
            </li>
            <li class="tab-item" data-target="view-listen" data-title="Listen">
                <svg class="tab-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <span>Listen</span>
            </li>
            <li class="tab-item" data-target="view-loggen" data-title="Loggen">
                <svg class="tab-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                <span>Loggen</span>
            </li>
            <li class="tab-item" data-target="view-menu" data-title="Menü">
                <svg class="tab-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"></path></svg>
                <span>Menü</span>
            </li>
        </ul>
    </nav>

    <script src="script.js"></script>
</body>
</html>
