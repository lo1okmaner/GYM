<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GymLog Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, deleteDoc, doc, updateDoc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsOrvObL2dpbV6H4HFNnHjGk_iDVJKdhs",
            authDomain: "my-gym-d5b6e.firebaseapp.com",
            projectId: "my-gym-d5b6e",
            storageBucket: "my-gym-d5b6e.firebasestorage.app",
            messagingSenderId: "262633382169",
            appId: "1:262633382169:web:13d6fc201eda300889e588"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        setPersistence(auth, browserLocalPersistence);

        window.db = db; window.auth = auth;
        window.fs = { collection, addDoc, getDocs, query, orderBy, where, deleteDoc, doc, updateDoc };
        window.authFuncs = { signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword };

        onAuthStateChanged(auth, (user) => {
            const ls = document.getElementById('loading-screen');
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'block';
                initApp();
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('main-wrapper').style.display = 'none';
            }
            ls.style.opacity = '0'; setTimeout(() => ls.style.display = 'none', 500);
        });
    </script>

    <style>
        :root {
            --bg-color: #000000; --card-bg: #1c1c1e; --input-bg: #2c2c2e;
            --text-main: #ffffff; --text-dim: #8e8e93; --accent-blue: #0a84ff;
            --accent-red: #ff453a; --border-color: #38383a;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        .container { max-width: 500px; margin: auto; padding: 20px 15px 120px 15px; }
        
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(28, 28, 30, 0.95); border-top: 0.5px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); z-index: 1000; backdrop-filter: blur(10px); }
        .tab-item { color: var(--text-dim); text-align: center; font-size: 11px; background: none; border: none; flex: 1; cursor: pointer; padding: 5px; }
        .tab-item.active { color: var(--accent-blue); }
        .tab-icon { font-size: 22px; display: block; margin-bottom: 4px; }

        .card { background: var(--card-bg); padding: 20px; border-radius: 14px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        input, select { background: var(--input-bg); border: none; border-radius: 10px; padding: 14px; color: white; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 12px; outline: none; }
        button { border-radius: 12px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; min-height: 44px; }
        .btn-blue { background: var(--accent-blue); color: white; width: 100%; }
        
        .view { display: none; }
        .view.active { display: block; }

        .list-item { border-bottom: 0.5px solid var(--border-color); padding: 15px 0; -webkit-tap-highlight-color: transparent; }
        .history-header { display: flex; align-items: center; cursor: pointer; position: relative; width: 100%; }
        .chevron { width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 7px solid var(--accent-blue); margin-right: 15px; transition: 0.3s; flex-shrink: 0; }
        .list-item.is-open .chevron { transform: rotate(90deg); }
        .details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; margin-left: 22px; font-size: 14px; }
        .list-item.is-open .details { max-height: 2000px; padding-top: 10px; }
        
        /* Kalender Styles */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .cal-day { aspect-ratio: 1/1; border-radius: 8px; background: #2c2c2e; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; position: relative; }
        .day-label { color: var(--text-dim); font-size: 10px; text-align: center; margin-bottom: 5px; text-transform: uppercase; }
        
        /* Kalender Markierungen */
        .day-me { background: var(--accent-blue) !important; color: white; }
        .day-bro { background: var(--accent-red) !important; color: white; }
        .day-both { background: linear-gradient(135deg, var(--accent-blue) 50%, var(--accent-red) 50%) !important; color: white; }

        .switch-container { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding: 5px 0; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(20px); }

        #loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen"><div class="spinner"></div></div>

<div id="login-section" class="container" style="display:none; margin-top: 60px;">
    <div class="card" style="text-align: center;">
        <h2>GymLog Pro</h2>
        <input type="email" id="email" placeholder="E-Mail">
        <input type="password" id="pass" placeholder="Passwort">
        <button class="btn-blue" onclick="handleLogin()">Einloggen</button>
        <button onclick="handleRegister()" style="background:none; color:var(--text-dim); margin-top:15px; width:100%;">Account erstellen</button>
    </div>
</div>

<div id="main-wrapper" style="display:none;">
    <div class="container">
        
        <div id="view-exercises" class="view">
            <h2>Übungskatalog</h2>
            <div class="card">
                <h3>+ Neue Übung</h3>
                <input type="text" id="new-ex-name" placeholder="Übung (z.B. Bankdrücken)">
                <button class="btn-blue" onclick="addExerciseDefinition()">Speichern</button>
            </div>
            <div class="card">
                <h3>+ Workout Vorlage</h3>
                <input type="text" id="tpl-title" placeholder="Name (z.B. Push Day)">
                <div id="tpl-exercise-selector"></div>
                <button onclick="addTemplateExerciseSelector()" style="background:none; color:var(--accent-blue); width:100%; margin-bottom:10px;">+ Übung hinzufügen</button>
                <button class="btn-blue" onclick="saveWorkoutTemplate()">Template speichern</button>
            </div>
            <div id="exercise-definitions-list"></div>
            <div id="workout-templates-list"></div>
        </div>

        <div id="view-tracking" class="view active">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Tracking</h2>
                <button onclick="handleLogout()" style="background:none; color:var(--accent-red); font-size:12px; width:auto; min-height:auto;">Logout</button>
            </div>
            <div class="card">
                <h3 id="form-title">Training loggen</h3>
                <select id="load-tpl-select" onchange="applyTemplate(this.value)">
                    <option value="">-- Vorlage laden? --</option>
                </select>
                <div style="display:flex; gap:10px;">
                    <input type="date" id="session-date">
                    <input type="text" id="session-name" placeholder="Titel">
                </div>
                <div id="tracking-exercises"></div>
                <button onclick="addTrackingExercise()" style="background:#3a3a3c; color:var(--accent-blue); width:100%; margin-bottom:10px;">+ Übung hinzufügen</button>
                <button class="btn-blue" onclick="saveSession()">Session speichern</button>
                <div id="edit-controls" style="display:none;">
                    <button onclick="resetForm()" style="background:none; color:var(--text-dim); width:100%; margin-top:10px;">Abbrechen</button>
                    <button onclick="deleteCurrentSession()" style="background:none; color:var(--accent-red); width:100%; margin-top:15px; border: 1px solid var(--accent-red);">Löschen</button>
                </div>
            </div>
            <div class="card"><h3>Verlauf</h3><div id="history">Lade...</div></div>
        </div>

        <div id="view-bro" class="view">
            <h2>Bro Progress</h2>
            
            <div class="card">
                <select id="bro-exercise-select" onchange="updateBroChart()">
                    <option value="">-- Übung wählen --</option>
                </select>
                <div class="switch-container">
                    <span>Vergleich mit Bruder</span>
                    <label class="switch">
                        <input type="checkbox" id="compare-bro-toggle" onchange="updateBroChart(); renderBroCalendar();">
                        <span class="slider"></span>
                    </label>
                </div>
                <div style="height: 250px; margin-top:15px;"><canvas id="progressChart"></canvas></div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 id="bro-cal-month" style="margin:0; font-size:16px;">Monat</h3>
                    <div style="display:flex; gap:10px;">
                        <button onclick="changeBroMonth(-1)" style="min-height:30px; padding:0 10px; background:#333;">‹</button>
                        <button onclick="changeBroMonth(1)" style="min-height:30px; padding:0 10px; background:#333;">›</button>
                    </div>
                </div>
                <div class="cal-grid" id="bro-calendar-days"></div>
                <div style="margin-top:15px; display:flex; gap:10px; font-size:10px; justify-content:center;">
                    <span style="display:flex; align-items:center; gap:4px;"><div style="width:10px; height:10px; background:var(--accent-blue); border-radius:2px;"></div> Ich</span>
                    <span id="legend-bro" style="display:none; align-items:center; gap:4px;"><div style="width:10px; height:10px; background:var(--accent-red); border-radius:2px;"></div> Bruder</span>
                </div>
            </div>
        </div>

    </div>

    <nav class="tab-bar">
        <button class="tab-item" id="tab-exercises" onclick="switchTab('exercises')"><span class="tab-icon">🏋️</span>Übungen</button>
        <button class="tab-item active" id="tab-tracking" onclick="switchTab('tracking')"><span class="tab-icon">📊</span>Tracking</button>
        <button class="tab-item" id="tab-bro" onclick="switchTab('bro')"><span class="tab-icon">🤜</span>Bro</button>
    </nav>
</div>

<script>
    let logs = [];
    let allSessionsRaw = []; 
    let exerciseDefinitions = [];
    let workoutTemplates = [];
    let editId = null;
    let myChart = null;
    let broCalDate = new Date();

    window.switchTab = function(tab) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('view-' + tab).classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
        if(tab === 'bro') {
            updateBroExerciseDropdown();
            renderBroCalendar();
            setTimeout(updateBroChart, 100);
        }
        window.scrollTo(0,0);
    }

    window.toggleAccordion = function(element) {
        element.closest('.list-item').classList.toggle('is-open');
    }

    async function handleLogin() {
        try { await window.authFuncs.signInWithEmailAndPassword(window.auth, document.getElementById('email').value, document.getElementById('pass').value); }
        catch(e) { alert("Fehler!"); }
    }
    async function handleRegister() {
        try { await window.authFuncs.createUserWithEmailAndPassword(window.auth, document.getElementById('email').value, document.getElementById('pass').value); }
        catch(e) { alert("Fehler!"); }
    }
    window.handleLogout = function() { if(confirm("Abmelden?")) window.authFuncs.signOut(window.auth); }

    async function initApp() {
        const user = window.auth.currentUser;
        if(!user) return;
        const exSnap = await window.fs.getDocs(window.fs.query(window.fs.collection(window.db, "exerciseDefs"), window.fs.where("userId", "==", user.uid)));
        exerciseDefinitions = []; exSnap.forEach(d => exerciseDefinitions.push({id: d.id, ...d.data()}));
        renderExerciseDefinitions();
        
        const tplSnap = await window.fs.getDocs(window.fs.query(window.fs.collection(window.db, "workoutTemplates"), window.fs.where("userId", "==", user.uid)));
        workoutTemplates = []; tplSnap.forEach(d => workoutTemplates.push({id: d.id, ...d.data()}));
        renderWorkoutTemplates(); updateTemplateDropdown();

        const tSnap = await window.fs.getDocs(window.fs.query(window.fs.collection(window.db, "sessions"), window.fs.orderBy("date", "asc")));
        allSessionsRaw = []; tSnap.forEach(d => allSessionsRaw.push({id: d.id, ...d.data()}));
        logs = allSessionsRaw.filter(s => s.userId === user.uid).reverse();
        renderHistory(); updateBroExerciseDropdown();
    }

    // Übungen & Vorlagen
    async function addExerciseDefinition() {
        const name = document.getElementById('new-ex-name').value;
        if(!name) return;
        await window.fs.addDoc(window.fs.collection(window.db, "exerciseDefs"), { userId: window.auth.currentUser.uid, name: name });
        document.getElementById('new-ex-name').value = ""; initApp();
    }

    function renderExerciseDefinitions() {
        const list = document.getElementById('exercise-definitions-list'); list.innerHTML = "";
        exerciseDefinitions.sort((a,b) => a.name.localeCompare(b.name)).forEach(ex => {
            const div = document.createElement('div'); div.className = "list-item";
            div.style.display="flex"; div.style.justifyContent="space-between";
            div.innerHTML = `<span>${ex.name}</span><button onclick="deleteExDef('${ex.id}')" style="background:none; color:red; min-height:auto; width:auto;">×</button>`;
            list.appendChild(div);
        });
    }

    async function deleteExDef(id) { if(confirm("Löschen?")) { await window.fs.deleteDoc(window.fs.doc(window.db, "exerciseDefs", id)); initApp(); } }

    window.addTemplateExerciseSelector = function() {
        const container = document.getElementById('tpl-exercise-selector');
        const select = document.createElement('select'); select.className = "tpl-ex-item";
        let opts = exerciseDefinitions.map(ex => `<option value="${ex.name}">${ex.name}</option>`).join('');
        select.innerHTML = `<option value="">-- wählen --</option>${opts}`;
        container.appendChild(select);
    };

    async function saveWorkoutTemplate() {
        const t = document.getElementById('tpl-title').value;
        const s = document.querySelectorAll('.tpl-ex-item');
        let n = []; s.forEach(x => { if(x.value) n.push(x.value); });
        await window.fs.addDoc(window.fs.collection(window.db, "workoutTemplates"), { userId: window.auth.currentUser.uid, title: t, exerciseNames: n });
        document.getElementById('tpl-title').value = ""; document.getElementById('tpl-exercise-selector').innerHTML = ""; initApp();
    }

    function renderWorkoutTemplates() {
        const list = document.getElementById('workout-templates-list'); list.innerHTML = "<h4>Vorlagen</h4>";
        workoutTemplates.forEach(t => {
            const div = document.createElement('div'); div.className = "list-item";
            div.innerHTML = `<b>${t.title}</b><br><small>${t.exerciseNames.join(', ')}</small><button onclick="deleteTpl('${t.id}')" style="background:none; color:red; min-height:auto; float:right; width:auto;">×</button>`;
            list.appendChild(div);
        });
    }

    function updateTemplateDropdown() {
        const sel = document.getElementById('load-tpl-select'); sel.innerHTML = '<option value="">-- Vorlage laden? --</option>';
        workoutTemplates.forEach(t => { const opt = document.createElement('option'); opt.value = t.id; opt.innerText = t.title; sel.appendChild(opt); });
    }

    window.applyTemplate = function(tplId) {
        if(!tplId) return; const tpl = workoutTemplates.find(t => t.id === tplId);
        document.getElementById('session-name').value = tpl.title; document.getElementById('tracking-exercises').innerHTML = "";
        tpl.exerciseNames.forEach(name => addTrackingExercise(name)); document.getElementById('load-tpl-select').value = "";
    };

    // Tracking
    window.addTrackingExercise = function(name = "", sets = []) {
        const container = document.getElementById('tracking-exercises');
        const div = document.createElement('div'); div.className = "card"; div.style.padding = "15px"; div.style.marginBottom = "10px";
        let opts = exerciseDefinitions.map(ex => `<option value="${ex.name}" ${ex.name === name ? 'selected' : ''}>${ex.name}</option>`).join('');
        div.innerHTML = `
            <select class="ex-select" style="margin-bottom:10px; font-weight:700;"><option value="">-- wählen --</option>${opts}</select>
            <div class="sets-list"></div>
            <button onclick="addSetRow(this.previousElementSibling)" style="width:auto; font-size:12px; padding:6px 12px; background:#3a3a3c; margin-top:5px;">+ Satz</button>
            <button onclick="this.parentElement.remove()" style="float:right; background:none; color:red; font-size:24px; margin-top:-5px; width:auto;">×</button>`;
        container.appendChild(div);
        const list = div.querySelector('.sets-list');
        if(sets.length > 0) sets.forEach(s => addSetRow(list, s.reps, s.kg)); else addSetRow(list);
    };

    window.addSetRow = function(container, reps="", kg="") {
        const row = document.createElement('div'); row.style.display = "grid"; row.style.gridTemplateColumns = "1fr 1fr 30px"; row.style.gap = "8px"; row.style.marginTop = "5px";
        row.innerHTML = `<input type="number" class="s-reps" placeholder="R" value="${reps}" style="margin:0;"><input type="number" class="s-weight" placeholder="kg" value="${kg}" style="margin:0;"><button onclick="this.parentElement.remove()" style="background:none; color:red; width:auto;">×</button>`;
        container.appendChild(row);
    };

    async function saveSession() {
        const u = window.auth.currentUser;
        const b = document.querySelectorAll('#tracking-exercises .card');
        let ex = []; b.forEach(x => {
            const n = x.querySelector('.ex-select').value;
            const rs = x.querySelectorAll('.s-reps'), ws = x.querySelectorAll('.s-weight');
            let sets = []; for(let i=0; i<rs.length; i++) if(rs[i].value) sets.push({reps: rs[i].value, kg: ws[i].value});
            if(n) ex.push({name: n, sets: sets});
        });
        const data = { userId: u.uid, date: document.getElementById('session-date').value, title: document.getElementById('session-name').value || "Gym", exercises: ex };
        if(editId) await window.fs.updateDoc(window.fs.doc(window.db, "sessions", editId), data);
        else await window.fs.addDoc(window.fs.collection(window.db, "sessions"), data);
        resetForm(); initApp();
    }

    async function deleteCurrentSession() { if(editId && confirm("Löschen?")) { await window.fs.deleteDoc(window.fs.doc(window.db, "sessions", editId)); resetForm(); initApp(); } }

    function renderHistory() {
        const h = document.getElementById('history'); h.innerHTML = "";
        logs.forEach(s => {
            const item = document.createElement('div'); item.className = "list-item";
            let exHtml = s.exercises.map(ex => `<div class="ex-line"><span class="ex-name-label">${ex.name}:</span> ${ex.sets.map(st => st.reps+'x'+st.kg).join(' · ')}</div>`).join('');
            item.innerHTML = `<div class="history-header" onclick="toggleAccordion(this)"><span class="chevron"></span><div style="flex-grow:1;"><b>${s.title}</b> <br><small style="color:var(--text-dim)">${new Date(s.date).toLocaleDateString('de-DE')}</small></div><button onclick="event.stopPropagation(); loadEdit('${s.id}')" style="background:none; color:var(--accent-blue); font-size:12px; width:auto; min-height:auto; padding:10px;">Edit</button></div><div class="details">${exHtml}</div>`;
            h.appendChild(item);
        });
    }

    window.loadEdit = function(id) {
        const s = logs.find(l => l.id === id); editId = id; 
        document.getElementById('session-date').value = s.date; document.getElementById('session-name').value = s.title;
        document.getElementById('tracking-exercises').innerHTML = ""; s.exercises.forEach(ex => addTrackingExercise(ex.name, ex.sets));
        document.getElementById('form-title').innerText = "Bearbeiten"; document.getElementById('edit-controls').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    window.resetForm = function() {
        editId = null; document.getElementById('session-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('session-name').value = ""; document.getElementById('tracking-exercises').innerHTML = "";
        document.getElementById('form-title').innerText = "Gym loggen"; document.getElementById('edit-controls').style.display = "none";
    };

    // BRO LOGIK
    function updateBroExerciseDropdown() {
        const sel = document.getElementById('bro-exercise-select');
        const cur = sel.value; sel.innerHTML = '<option value="">-- Übung wählen --</option>';
        exerciseDefinitions.sort((a,b)=>a.name.localeCompare(b.name)).forEach(ex=>{ const opt=document.createElement('option'); opt.value=ex.name; opt.innerText=ex.name; sel.appendChild(opt); });
        sel.value = cur;
    }

    window.updateBroChart = function() {
        const exName = document.getElementById('bro-exercise-select').value; if(!exName) return;
        const compare = document.getElementById('compare-bro-toggle').checked;
        const uid = window.auth.currentUser.uid;
        const myD = [], broD = [];
        allSessionsRaw.forEach(s=>{
            const ex = s.exercises.find(e=>e.name===exName);
            if(ex) {
                const max = Math.max(...ex.sets.map(st=>parseFloat(st.kg)||0));
                if(s.userId === uid) myD.push({x:s.date, y:max}); else broD.push({x:s.date, y:max});
            }
        });
        const ds = [{ label: 'Ich', data: myD, borderColor: '#0a84ff', backgroundColor: 'rgba(10, 132, 255, 0.1)', tension: 0.3, fill: true }];
        if(compare && broD.length>0) ds.push({ label: 'Bruder', data: broD, borderColor: '#ff453a', backgroundColor: 'rgba(255, 69, 58, 0.1)', tension: 0.3, fill: true });
        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('progressChart').getContext('2d'), { type: 'line', data: { datasets: ds }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { color: '#333' }, ticks: { color: '#8e8e93' } }, y: { grid: { color: '#333' }, ticks: { color: '#8e8e93' } } }, plugins: { legend: { labels: { color: '#fff' } } } } });
    }

    // NEU: BRO KALENDER
    window.changeBroMonth = (v) => { broCalDate.setMonth(broCalDate.getMonth() + v); renderBroCalendar(); }

    window.renderBroCalendar = function() {
        const grid = document.getElementById('bro-calendar-days'); grid.innerHTML = "";
        const compare = document.getElementById('compare-bro-toggle').checked;
        const uid = window.auth.currentUser.uid;
        document.getElementById('legend-bro').style.display = compare ? 'flex' : 'none';
        
        const myDates = allSessionsRaw.filter(s => s.userId === uid).map(s => s.date);
        const broDates = allSessionsRaw.filter(s => s.userId !== uid).map(s => s.date);

        const first = new Date(broCalDate.getFullYear(), broCalDate.getMonth(), 1);
        const last = new Date(broCalDate.getFullYear(), broCalDate.getMonth() + 1, 0);
        document.getElementById('bro-cal-month').innerText = broCalDate.toLocaleString('de-de', {month:'long', year:'numeric'});

        // Wochentage Header
        ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d => {
            const el = document.createElement('div'); el.className="day-label"; el.innerText=d; grid.appendChild(el);
        });

        let start = (first.getDay() + 6) % 7;
        for (let i = 0; i < start; i++) grid.appendChild(document.createElement('div'));

        for (let d = 1; d <= last.getDate(); d++) {
            const ds = `${broCalDate.getFullYear()}-${String(broCalDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const div = document.createElement('div'); div.className = "cal-day"; div.innerText = d;
            
            const isMe = myDates.includes(ds);
            const isBro = compare && broDates.includes(ds);

            if(isMe && isBro) div.classList.add('day-both');
            else if(isMe) div.classList.add('day-me');
            else if(isBro) div.classList.add('day-bro');

            grid.appendChild(div);
        }
    }

    document.getElementById('session-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
