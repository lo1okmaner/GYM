<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GymLog Cloud</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, updateDoc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. HIER DEINE CONFIG VON FIREBASE EINFÜGEN:
       const firebaseConfig = {
    apiKey: "AIzaSyBsOrvObL2dpbV6H4HFNnHjGk_iDVJKdhs",
    authDomain: "my-gym-d5b6e.firebaseapp.com",
    projectId: "my-gym-d5b6e",
    storageBucket: "my-gym-d5b6e.firebasestorage.app",
    messagingSenderId: "262633382169",
    appId: "1:262633382169:web:13d6fc201eda300889e588",
    measurementId: "G-C3L4WMBYTG"
  };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; // Global verfügbar machen
        window.firestoreFuncs = { collection, addDoc, getDocs, query, orderBy, deleteDoc, doc, updateDoc };
        
        // App starten
        setTimeout(() => { resetForm(); renderAll(); }, 500);
    </script>

    <style>
        :root {
            --bg-color: #000000; --card-bg: #1c1c1e; --input-bg: #2c2c2e;
            --text-main: #ffffff; --text-dim: #8e8e93; --accent-blue: #0a84ff;
            --accent-green: #30d158; --accent-red: #ff453a; --border-color: #38383a;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); padding: 15px; color: var(--text-main); }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 14px; margin-bottom: 20px; }
        input { background: var(--input-bg); border: none; border-radius: 8px; padding: 12px; color: white; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 13px; }
        .has-workout { background: var(--accent-blue); }
        .exercise-block { background: #2c2c2e; padding: 15px; border-radius: 12px; margin-bottom: 12px; }
        .set-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 10px; margin-top: 8px; }
        button { cursor: pointer; border: none; border-radius: 10px; padding: 12px; font-weight: 600; transition: 0.1s; }
        .btn-save { background: var(--accent-blue); color: white; width: 100%; }
        .history-session { border-bottom: 0.5px solid var(--border-color); padding: 15px 0; position: relative; }
        .btn-edit { color: var(--accent-blue); background: none; position: absolute; right: 0; }
        .stat-val { font-size: 24px; font-weight: 700; color: var(--accent-blue); }
    </style>
</head>
<body>

<div class="container">
    <h2 id="status">Gym Cloud App</h2>

    <div class="card">
        <h3 id="form-title">Neue Session</h3>
        <input type="date" id="session-date">
        <input type="text" id="session-name" placeholder="Titel (Push/Pull...)">
        <div id="exercises-container"></div>
        <button onclick="addExercise()">+ Übung</button>
        <button class="btn-save" onclick="saveSession()">Speichern</button>
        <button id="cancel-edit" style="display:none; width:100%; margin-top:5px;" onclick="resetForm()">Abbrechen</button>
    </div>

    <div class="card">
        <div id="calendar-header" style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span id="cal-label">Monat</span>
            <div><button onclick="changeMonth(-1)">‹</button> <button onclick="changeMonth(1)">›</button></div>
        </div>
        <div class="calendar-grid" id="calendar-days"></div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
        <div class="card"><span class="stat-val" id="stat-total">0</span><br><small>Gesamt</small></div>
        <div class="card"><span class="stat-val" id="stat-month">0</span><br><small>30 Tage</small></div>
    </div>

    <div class="card">
        <h3>Verlauf</h3>
        <div id="history">Lade Daten aus Cloud...</div>
    </div>
</div>

<script>
    let logs = [];
    let editDocId = null;
    let currentCalDate = new Date();

    // Übung hinzufügen UI
    window.addExercise = function(name = "", sets = []) {
        const container = document.getElementById('exercises-container');
        const div = document.createElement('div');
        div.className = 'exercise-block';
        div.innerHTML = `
            <input type="text" class="ex-name" placeholder="Übung..." value="${name}">
            <div class="sets-list"></div>
            <button onclick="addSetRow(this.previousElementSibling)">+ Satz</button>
            <button onclick="this.parentElement.remove()" style="color:red; background:none;">Löschen</button>
        `;
        container.appendChild(div);
        const list = div.querySelector('.sets-list');
        if(sets.length > 0) sets.forEach(s => addSetRow(list, s.reps, s.kg));
        else addSetRow(list);
    };

    window.addSetRow = function(container, reps = "", kg = "") {
        const row = document.createElement('div');
        row.className = 'set-row';
        row.innerHTML = `<input type="number" class="s-reps" placeholder="R" value="${reps}"> 
                         <input type="number" class="s-weight" placeholder="kg" value="${kg}">
                         <button onclick="this.parentElement.remove()">-</button>`;
        container.appendChild(row);
    };

    // Daten aus Firebase laden
    async function renderAll() {
        if(!window.db) return;
        const { query, collection, getDocs, orderBy } = window.firestoreFuncs;
        const q = query(collection(window.db, "sessions"), orderBy("date", "desc"));
        const querySnapshot = await getDocs(q);
        logs = [];
        querySnapshot.forEach((doc) => {
            logs.push({ id: doc.id, ...doc.data() });
        });
        
        renderStats();
        renderCalendar();
        renderHistory();
    }

    // Speichern in Firebase
    window.saveSession = async function() {
        const { collection, addDoc, updateDoc, doc } = window.firestoreFuncs;
        const date = document.getElementById('session-date').value;
        const title = document.getElementById('session-name').value || "Training";
        const blocks = document.getElementsByClassName('exercise-block');
        
        let sessionEx = [];
        for (let b of blocks) {
            const name = b.querySelector('.ex-name').value;
            const rs = b.querySelectorAll('.s-reps'), ws = b.querySelectorAll('.s-weight');
            let sets = [];
            for (let i = 0; i < rs.length; i++) {
                if(rs[i].value) sets.push({ reps: rs[i].value, kg: ws[i].value });
            }
            if(name) sessionEx.push({ name, sets });
        }

        const data = { date, title, exercises: sessionEx };

        try {
            if (editDocId) {
                await updateDoc(doc(window.db, "sessions", editDocId), data);
                editDocId = null;
            } else {
                await addDoc(collection(window.db, "sessions"), data);
            }
            resetForm();
            renderAll();
        } catch (e) { alert("Fehler beim Speichern!"); }
    };

    // Helfer für UI
    window.renderHistory = function() {
        const hist = document.getElementById('history');
        hist.innerHTML = "";
        logs.forEach(s => {
            const div = document.createElement('div');
            div.className = "history-session";
            div.innerHTML = `<button class="btn-edit" onclick="editSession('${s.id}')">Edit</button>
                             <b>${s.title}</b> <small>${s.date}</small><br>`;
            s.exercises.forEach(ex => {
                div.innerHTML += `<div style="font-size:13px">${ex.name}: ${ex.sets.map(st => st.reps+'x'+st.kg+'kg').join(' · ')}</div>`;
            });
            hist.appendChild(div);
        });
    };

    window.editSession = function(id) {
        const s = logs.find(l => l.id === id);
        editDocId = id;
        document.getElementById('session-date').value = s.date;
        document.getElementById('session-name').value = s.title;
        document.getElementById('exercises-container').innerHTML = "";
        s.exercises.forEach(ex => addExercise(ex.name, ex.sets));
        document.getElementById('cancel-edit').style.display = "block";
        window.scrollTo(0,0);
    };

    window.resetForm = function() {
        editDocId = null;
        document.getElementById('session-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('session-name').value = "";
        document.getElementById('exercises-container').innerHTML = "";
        addExercise();
        document.getElementById('cancel-edit').style.display = "none";
    };

    // Kalender & Stats (Logik wie vorher, nur basierend auf logs Array)
    window.renderCalendar = function() {
        const grid = document.getElementById('calendar-days');
        grid.innerHTML = "";
        const first = new Date(currentCalDate.getFullYear(), currentCalDate.getMonth(), 1);
        const last = new Date(currentCalDate.getFullYear(), currentCalDate.getMonth() + 1, 0);
        let start = (first.getDay() + 6) % 7;
        for (let i = 0; i < start; i++) grid.appendChild(document.createElement('div'));
        const workoutDates = logs.map(l => l.date);
        for (let d = 1; d <= last.getDate(); d++) {
            const dateStr = `${currentCalDate.getFullYear()}-${String(currentCalDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const div = document.createElement('div');
            div.className = "calendar-day" + (workoutDates.includes(dateStr) ? " has-workout" : "");
            div.innerText = d;
            grid.appendChild(div);
        }
        document.getElementById('cal-label').innerText = currentCalDate.toLocaleString('de-de', {month:'long', year:'numeric'});
    };

    window.changeMonth = (d) => { currentCalDate.setMonth(currentCalDate.getMonth()+d); renderCalendar(); };
    window.renderStats = () => {
        document.getElementById('stat-total').innerText = logs.length;
        const thirty = new Date(); thirty.setDate(thirty.getDate()-30);
        document.getElementById('stat-month').innerText = logs.filter(l => new Date(l.date) >= thirty).length;
    };
</script>
</body>
</html>
